<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>History - Age Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="card">

            <h1>Calculation <span>History</span></h1>

            <div id="historyBox"></div>

            <a href="index.html">
                <button>Back to Calculator</button>
            </a>

        </div>

    </div>

    <script>
        const password = prompt("Enter Admin Password:");

        if (password !== "1234") {
            document.body.innerHTML = "<h2 style='color:red;text-align:center;margin-top:50px;'>Access Denied</h2>";
            throw new Error("Unauthorized");
            navigator.vibrate(200);
        }

        let data = JSON.parse(localStorage.getItem("allCalculations")) || [];

        const box = document.getElementById("historyBox");

        if (data.length === 0) {
            box.innerHTML = "<p style='color:white'>No history found</p>";
        } else {
            data.reverse().forEach(item => {
                const div = document.createElement("div");
                div.style.cssText = `
        background: rgba(255,255,255,0.08);
        padding: 12px;
        margin: 10px 0;
        border-radius: 10px;
        color: white;
      `;

                div.innerHTML = `
        <b>DOB:</b> ${item.dob}<br>
        <b>Result:</b> ${item.result}<br>
        <small>${item.time}</small>
      `;

                box.appendChild(div);
            });
        }
    </script>
</body>

</html>
